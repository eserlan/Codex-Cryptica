    <circle cx="16" cy="48" r="0.5"/><circle cx="48" cy="48" r="0.5"/><circle cx="80" cy="48" r="0.5"/><circle cx="112" cy="48" r="0.5"/><circle cx="144" cy="48" r="0.5"/><circle cx="176" cy="48" r="0.5"/><circle cx="208" cy="48" r="0.5"/><circle cx="240" cy="48" r="0.5"/>
    <circle cx="16" cy="80" r="0.5"/><circle cx="48" cy="80" r="0.5"/><circle cx="80" cy="80" r="0.5"/><circle cx="112" cy="80" r="0.5"/><circle cx="144" cy="80" r="0.5"/><circle cx="176" cy="80" r="0.5"/><circle cx="208" cy="80" r="0.5"/><circle cx="240" cy="80" r="0.5"/>
    <circle cx="16" cy="112" r="0.5"/><circle cx="48" cy="112" r="0.5"/><circle cx="80" cy="112" r="0.5"/><circle cx="112" cy="112" r="0.5"/><circle cx="144" cy="112" r="0.5"/><circle cx="176" cy="112" r="0.5"/><circle cx="208" cy="112" r="0.5"/><circle cx="240" cy="112" r="0.5"/>
    <circle cx="16" cy="144" r="0.5"/><circle cx="48" cy="144" r="0.5"/><circle cx="80" cy="144" r="0.5"/><circle cx="112" cy="144" r="0.5"/><circle cx="144" cy="144" r="0.5"/><circle cx="176" cy="144" r="0.5"/><circle cx="208" cy="144" r="0.5"/><circle cx="240" cy="144" r="0.5"/>
    <circle cx="16" cy="176" r="0.5"/><circle cx="48" cy="176" r="0.5"/><circle cx="80" cy="176" r="0.5"/><circle cx="112" cy="176" r="0.5"/><circle cx="144" cy="176" r="0.5"/><circle cx="176" cy="176" r="0.5"/><circle cx="208" cy="176" r="0.5"/><circle cx="240" cy="176" r="0.5"/>

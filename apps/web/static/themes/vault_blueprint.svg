  <!-- Blueprint Border Lines -->
  <g stroke="#1e40af" stroke-width="0.8" fill="none" opacity="0.15">
    <rect x="8" y="8" width="240" height="240"/>
    <rect x="12" y="12" width="232" height="232" stroke-dasharray="4,4"/>
  </g>

  <!-- Gear Outline Graphics (Center 128,128) -->
  <g stroke="#1e40af" stroke-width="0.8" fill="none" opacity="0.15">
    <!-- Concentric blueprint circles -->
    <circle cx="128" cy="128" r="48" stroke-width="1.2"/>
    <circle cx="128" cy="128" r="32" stroke-dasharray="3,3"/>
    <circle cx="128" cy="128" r="16"/>
    
    <!-- Schematic Spokes / Centerlines -->
    <line x1="128" y1="64" x2="128" y2="192"/>
    <line x1="64" y1="128" x2="192" y2="128"/>
    <line x1="82" y1="82" x2="174" y2="174" stroke-dasharray="2,2"/>
    <line x1="174" y1="82" x2="82" y2="174" stroke-dasharray="2,2"/>
    
    <!-- Gear teeth representation -->
    <circle cx="128" cy="128" r="44" stroke-width="6" stroke-dasharray="10,13"/>
  </g>

<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <!--
    Sci-Fi Terminal surface texture. Tiles seamlessly at 256px.
    Sits under the theme's ~50% colour overlay on a near-black background
    (#050505). Terminal green (#4ade80) primary, purple (#a855f7) accent.
    Layers: fine grid + sub-grid + scanlines + circuit traces with nodes +
    crosshair markers + data readout fragments + glitch accent bars.
  -->

  <!-- Main grid at 64px. Evenly divisible into 256. -->
  <g stroke="#4ade80" stroke-width="0.75" opacity="0.14">
    <path d="M0 0V256 M64 0V256 M128 0V256 M192 0V256"/>
    <path d="M0 0H256 M0 64H256 M0 128H256 M0 192H256"/>
  </g>

  <!-- Sub-grid at 32px, dashed, even fainter. -->
  <g stroke="#4ade80" stroke-width="0.4" stroke-dasharray="2,4" opacity="0.07">
    <path d="M32 0V256 M96 0V256 M160 0V256 M224 0V256"/>
    <path d="M0 32H256 M0 96H256 M0 160H256 M0 224H256"/>
  </g>

  <!-- Scanlines: 1px every 4px (64 lines per tile = clean repeat). -->
  <g fill="#000000" opacity="0.10">
    <rect width="256" height="1" y="0"/><rect width="256" height="1" y="4"/>
    <rect width="256" height="1" y="8"/><rect width="256" height="1" y="12"/>
    <rect width="256" height="1" y="16"/><rect width="256" height="1" y="20"/>
    <rect width="256" height="1" y="24"/><rect width="256" height="1" y="28"/>
    <rect width="256" height="1" y="32"/><rect width="256" height="1" y="36"/>
    <rect width="256" height="1" y="40"/><rect width="256" height="1" y="44"/>
    <rect width="256" height="1" y="48"/><rect width="256" height="1" y="52"/>
    <rect width="256" height="1" y="56"/><rect width="256" height="1" y="60"/>
    <rect width="256" height="1" y="64"/><rect width="256" height="1" y="68"/>
    <rect width="256" height="1" y="72"/><rect width="256" height="1" y="76"/>
    <rect width="256" height="1" y="80"/><rect width="256" height="1" y="84"/>
    <rect width="256" height="1" y="88"/><rect width="256" height="1" y="92"/>
    <rect width="256" height="1" y="96"/><rect width="256" height="1" y="100"/>
    <rect width="256" height="1" y="104"/><rect width="256" height="1" y="108"/>
    <rect width="256" height="1" y="112"/><rect width="256" height="1" y="116"/>
    <rect width="256" height="1" y="120"/><rect width="256" height="1" y="124"/>
    <rect width="256" height="1" y="128"/><rect width="256" height="1" y="132"/>
    <rect width="256" height="1" y="136"/><rect width="256" height="1" y="140"/>
    <rect width="256" height="1" y="144"/><rect width="256" height="1" y="148"/>
    <rect width="256" height="1" y="152"/><rect width="256" height="1" y="156"/>
    <rect width="256" height="1" y="160"/><rect width="256" height="1" y="164"/>
    <rect width="256" height="1" y="168"/><rect width="256" height="1" y="172"/>
    <rect width="256" height="1" y="176"/><rect width="256" height="1" y="180"/>
    <rect width="256" height="1" y="184"/><rect width="256" height="1" y="188"/>
    <rect width="256" height="1" y="192"/><rect width="256" height="1" y="196"/>
    <rect width="256" height="1" y="200"/><rect width="256" height="1" y="204"/>
    <rect width="256" height="1" y="208"/><rect width="256" height="1" y="212"/>
    <rect width="256" height="1" y="216"/><rect width="256" height="1" y="220"/>
    <rect width="256" height="1" y="224"/><rect width="256" height="1" y="228"/>
    <rect width="256" height="1" y="232"/><rect width="256" height="1" y="236"/>
    <rect width="256" height="1" y="240"/><rect width="256" height="1" y="244"/>
    <rect width="256" height="1" y="248"/><rect width="256" height="1" y="252"/>
  </g>

  <!-- Circuit traces: angular right-angle runs like data bus routing. -->
  <g fill="none" stroke="#4ade80" stroke-width="1.4" opacity="0.45">
    <path d="M20 56 H64 V88 H104"/>
    <path d="M192 24 V64 H152 V96"/>
    <path d="M24 184 H72 V216"/>
    <path d="M168 152 H220 V200"/>
  </g>
  <!-- Purple accent trace. -->
  <path d="M104 196 V228 H156" fill="none" stroke="#a855f7" stroke-width="1.4" opacity="0.40"/>

  <!-- Terminal nodes at trace endpoints and junctions. -->
  <g fill="#4ade80" opacity="0.55">
    <circle cx="20" cy="56" r="2.5"/>
    <circle cx="104" cy="88" r="2.5"/>
    <circle cx="192" cy="24" r="2.5"/>
    <circle cx="152" cy="96" r="2.5"/>
    <circle cx="24" cy="184" r="2.5"/>
    <circle cx="168" cy="152" r="2.5"/>
    <circle cx="220" cy="200" r="2.5"/>
  </g>
  <circle cx="104" cy="196" r="2.5" fill="#a855f7" opacity="0.52"/>

  <!-- Crosshair markers at grid intersections. -->
  <g stroke="#4ade80" stroke-width="1" opacity="0.28">
    <!-- Centre (128,128) -->
    <path d="M120 128 H112 M136 128 H144 M128 120 V112 M128 136 V144"/>
    <rect x="124" y="124" width="8" height="8" fill="none" stroke-dasharray="2,2"/>
    <!-- Top-right (192,64) -->
    <path d="M186 64 H180 M198 64 H204 M192 58 V52 M192 70 V76"/>
    <!-- Bottom-left (64,192) -->
    <path d="M58 192 H52 M70 192 H76 M64 186 V180 M64 198 V204"/>
  </g>

  <!-- Data readout text fragments (tiny monospace). -->
  <g fill="#4ade80" font-family="monospace" font-size="6" opacity="0.18">
    <text x="108" y="44">SYS:ONLINE // v4.2</text>
    <text x="10" y="112">NODE:07 // ACTIVE</text>
    <text x="140" y="250">DATA // STREAM:OK</text>
  </g>

  <!-- Glitch accent bars — green and purple. -->
  <rect x="40" y="92" width="16" height="4" fill="#a855f7" opacity="0.45"/>
  <rect x="164" y="32" width="12" height="4" fill="#4ade80" opacity="0.42"/>
  <rect x="200" y="168" width="18" height="5" fill="#a855f7" opacity="0.38"/>
  <rect x="76" y="228" width="10" height="3" fill="#4ade80" opacity="0.42"/>
  <rect x="136" y="144" width="14" height="4" fill="#a855f7" opacity="0.32"/>
</svg>

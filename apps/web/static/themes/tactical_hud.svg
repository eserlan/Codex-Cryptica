<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256">
    <!-- Corner Angle Brackets -->
    <g stroke="#22d3ee" stroke-width="1.2" fill="none" opacity="0.2">
      <path d="M 0 16 V 0 H 16"/>
      <path d="M 256 16 V 0 H 240"/>
      <path d="M 0 240 V 256 H 16"/>
      <path d="M 256 240 V 256 H 240"/>
    </g>

    <!-- Hexagonal HUD/Tracking Brackets (Center 128,128) -->
    <g stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.15">
      <!-- Left HUD bracket -->
      <path d="M 80 100 L 70 110 V 146 L 80 156"/>
      <!-- Right HUD bracket -->
      <path d="M 176 100 L 186 110 V 146 L 176 156"/>
      
      <!-- Central Target Box -->
      <rect x="123" y="123" width="10" height="10" stroke-dasharray="2,2"/>
    </g>

    <!-- Flight chevron indicators -->
    <g stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.25">
      <path d="M 128 70 L 122 76 M 128 70 L 134 76"/>
      <path d="M 128 186 L 122 180 M 128 186 L 134 180"/>
    </g>

    <!-- HUD Tech readouts -->
    <g fill="#22d3ee" font-family="monospace" font-size="7" opacity="0.12">
      <text x="18" y="28">SEC.LOC // 88-A</text>
      <text x="178" y="235">ACTIVE // HUD</text>
    </g>
  </svg>

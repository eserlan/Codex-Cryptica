<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<!-- Non-blocking Google Fonts: preconnect + preload/swap to avoid render-blocking -->
	<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="preload" as="style"
		href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@300;500;700&family=Inter:wght@300;400;700&family=Orbitron:wght@400;700&family=Spectral:ital,wght@0,400;0,700;1,400&display=swap"
		onload="this.onload=null;this.rel='stylesheet'" />
	<noscript>
		<link rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@300;500;700&family=Inter:wght@300;400;700&family=Orbitron:wght@400;700&family=Spectral:ital,wght@0,400;0,700;1,400&display=swap" />
	</noscript>
	<script src="https://accounts.google.com/gsi/client" async defer></script>
	<script src="https://apis.google.com/js/api.js" async defer></script>
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<script>
		// Prevent FOUC for Skip Welcome and Theme
		try {
			if (localStorage.getItem("codex_skip_landing") === "true" || new URLSearchParams(window.location.search).has("demo")) {
				document.documentElement.classList.add("skip-landing");
			}
			const theme = localStorage.getItem("codex-cryptica-active-theme");
			const bgColors = {
				scifi: "#050505",
				fantasy: "#fdf6e3",
				modern: "#f8fafc",
				cyberpunk: "#020617",
				apocalyptic: "#1c1917",
				horror: "#050505"
			};
			if (theme && bgColors[theme]) {
				document.documentElement.style.setProperty("--color-bg-primary", bgColors[theme]);
				document.documentElement.style.backgroundColor = bgColors[theme];
			}
		} catch (e) { }
	</script>
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>

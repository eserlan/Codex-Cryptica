[test]
watch = false
preload = ["../../tests/bun-preload.ts"]
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "node_modules/**",
  "tests/**",
  "**/*.test.ts",
  "**/*.spec.ts",
  "**/*.config.ts",
  ".svelte-kit/**",
  "src/index.ts",
  "../*/src/**",
  "../../tests/**",
  "**/*.md",
]

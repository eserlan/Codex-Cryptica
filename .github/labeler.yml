# GitHub Labeler Configuration
# https://github.com/actions/labeler

web:
  - changed-files:
      - any-glob-to-any-file: apps/web/**/*

packages:
  - changed-files:
      - any-glob-to-any-file: packages/**/*

documentation:
  - changed-files:
      - any-glob-to-any-file: 
          - docs/**/*
          - "**/*.md"

infrastructure:
  - changed-files:
      - any-glob-to-any-file: 
          - .github/**/*
          - turbo.json
          - package.json
          - package-lock.json

scripts:
  - changed-files:
      - any-glob-to-any-file: scripts/**/*

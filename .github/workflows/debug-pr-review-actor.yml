name: Debug PR review actor

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Print reviewer identity (logs)
        run: |
          echo "review.user.login: ${{ github.event.review.user.login }}"
          echo "review.user.type:  ${{ github.event.review.user.type }}"
          echo "review.state:      ${{ github.event.review.state }}"
          echo "pr:                ${{ github.event.pull_request.html_url }}"

      - name: Send debug info to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_STAGING }}
        run: |
          payload=$(jq -n \
            --arg content "🔍 **PR Review Debug**
            **Login:** \`${{ github.event.review.user.login }}\`
            **Type:** \`${{ github.event.review.user.type }}\`
            **State:** \`${{ github.event.review.state }}\`
            **PR:** ${{ github.event.pull_request.html_url }}" \
            '{content: $content}')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"

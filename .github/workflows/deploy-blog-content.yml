name: Deploy Blog Content

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/src/lib/content/blog/**"
      - "scripts/publish-blog-content.mjs"
      - ".github/workflows/deploy-blog-content.yml"
  workflow_dispatch:

concurrency:
  group: blog-content
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Publish Blog Content
        run: node scripts/publish-blog-content.mjs

      - name: Commit and Push Blog Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -C blog-content
          git add blog
          if git diff --cached --quiet; then
            echo "No blog content changes to publish."
            exit 0
          fi
          git commit --no-verify -m "📝 Update blog content"
          git push --no-verify --force-with-lease origin blog-content

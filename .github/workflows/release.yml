name: Create GitHub Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if version changed and is major/minor
        id: check
        run: |
          # Get current version
          NEW_VERSION=$(jq -r .version apps/web/package.json)
          
          # More robustly find the previous version by looking for the last commit NOT from the bot
          # We skip the current commit (which is the bump) and look at the previous state
          PREV_SHA=$(git rev-list -n 1 --skip=1 HEAD)
          OLD_VERSION=$(git show $PREV_SHA:apps/web/package.json | jq -r .version)
          
          echo "Current version: $NEW_VERSION"
          echo "Previous version: $OLD_VERSION"
          
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            # Regex to detect major/minor (e.g., X.Y.0)
            if [[ $NEW_VERSION =~ ^[0-9]+\.[0-9]+\.0$ ]]; then
              echo "Detected major/minor bump ($NEW_VERSION). Triggering release."
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            else
              echo "Detected patch bump ($NEW_VERSION). Skipping release."
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No version change detected."
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  create-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build --workspace=web

      - name: Create Portable Codex Zip
        run: |
          if [ ! -d "apps/web/build" ]; then
            echo "Error: Build directory apps/web/build not found."
            exit 1
          fi
          cd apps/web/build
          zip -r ../../../codex-cryptica-${{ needs.check-version.outputs.version }}.zip .
          cd ../../..

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Codex Cryptica v${{ needs.check-version.outputs.version }}
          body: |
            ## Codex Cryptica v${{ needs.check-version.outputs.version }}
            
            This release marks a significant update to the Codex.
            
            ### Artifacts
            - **codex-cryptica-${{ needs.check-version.outputs.version }}.zip**: A standalone, portable version of the app. Download, extract, and serve locally for maximum data sovereignty.
            
            [Full Changelog](https://github.com/${{ github.repository }}/compare/v${{ github.event.before }}...v${{ needs.check-version.outputs.version }})
          draft: false
          prerelease: false
          files: codex-cryptica-${{ needs.check-version.outputs.version }}.zip

      - name: Notify Release
        if: success()
        run: |
          ./scripts/discord-deploy.sh "release" "https://discord.com/api/webhooks/1474849546210115654/cd5PD5CPTH3cV8DxbV9FCgqRqQUUJm_jF0Ovo0H-3FqcxzVcx0t7bethsoCYI36Lw7He" "https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.version }}"

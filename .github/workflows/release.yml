name: Create GitHub Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      before_sha: ${{ steps.check.outputs.before_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 5 # Get enough history to find previous versions

      - name: Check if version is major/minor
        id: check
        run: |
          # Get current version from the now-updated main branch
          NEW_VERSION=$(jq -r .version apps/web/package.json)
          
          # Find the previous version (ignoring the bot commit)
          # The current commit is the bump commit. HEAD~1 is the PR merge.
          PREV_SHA=$(git rev-list -n 1 --skip=1 HEAD)
          OLD_VERSION=$(git show $PREV_SHA:apps/web/package.json | jq -r .version)
          
          echo "Current version: $NEW_VERSION"
          echo "Previous version: $OLD_VERSION"
          echo "before_sha=$PREV_SHA" >> $GITHUB_OUTPUT
          
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            # Regex to detect major/minor (e.g., X.Y.0)
            if [[ $NEW_VERSION =~ ^[0-9]+\.[0-9]+\.0$ ]]; then
              echo "Detected major/minor bump ($NEW_VERSION). Triggering release."
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            else
              echo "Detected patch bump ($NEW_VERSION). Skipping release."
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No version change detected between HEAD and HEAD~1 (expected if auto-bump failed or ran twice)."
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  create-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm run build --workspace=web

      - name: Create Portable Codex Zip
        run: |
          if [ ! -d "apps/web/build" ]; then
            echo "Error: Build directory apps/web/build not found."
            exit 1
          fi
          cd apps/web/build
          zip -r ../../../codex-cryptica-${{ needs.check-version.outputs.version }}.zip .
          cd ../../..

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Codex Cryptica v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          body: |
            ## 📦 Portable Codex
            
            Download the `.zip` below for maximum data sovereignty. Extract and serve locally to run Codex Cryptica entirely offline.
            
            ---
          draft: false
          prerelease: false
          files: codex-cryptica-${{ needs.check-version.outputs.version }}.zip

      - name: Notify Release
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_RELEASE }}
        run: |
          ./scripts/discord-deploy.sh "release" "$DISCORD_WEBHOOK_URL" "https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.version }}"

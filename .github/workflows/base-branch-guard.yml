name: Base Branch Guard

on:
  pull_request:
    branches: [main]

jobs:
  check-base-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Reject PRs targeting main
        run: |
          echo "Error: Manual Pull Requests targeting the 'main' branch are not allowed."
          echo "Please target the 'staging' branch instead."
          echo "Code is automatically merged into 'main' during the Production Promotion process."
          exit 1

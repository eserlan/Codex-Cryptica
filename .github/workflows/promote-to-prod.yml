name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      staging_run_id:
        description: "Staging workflow run ID to promote (leave blank for latest successful staging run)"
        required: false
        type: string

concurrency:
  group: "promote-to-prod"
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write
  actions: read

jobs:
  find-staging-build:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.find.outputs.run_id }}
      commit_sha: ${{ steps.find.outputs.commit_sha }}
      commit_msg: ${{ steps.find.outputs.commit_msg }}
    steps:
      - name: Find latest successful staging run
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SPECIFIC_RUN: ${{ inputs.staging_run_id }}
        run: |
          if [ -n "$SPECIFIC_RUN" ]; then
            # Use the specified run
            RUN_ID="$SPECIFIC_RUN"
          else
            # Find the latest successful deploy run on staging branch
            RUN_ID=$(gh run list --workflow "Deploy to Cloudflare Pages" --branch staging --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          fi

          if [ -z "$RUN_ID" ]; then
            echo "Error: No successful staging deployment found to promote."
            exit 1
          fi

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

          # Get the commit details
          COMMIT_SHA=$(gh run view "$RUN_ID" --json headSha --jq '.headSha')
          COMMIT_MSG=$(gh run view "$RUN_ID" --json displayTitle --jq '.displayTitle')

          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

          echo "Promoting staging run #$RUN_ID ($COMMIT_SHA)"

  promote:
    needs: find-staging-build
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-dist
          run-id: ${{ needs.find-staging-build.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist/

      - name: Deploy to Production
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica

      - name: Sync Main Branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Merging promoted commit ${{ needs.find-staging-build.outputs.commit_sha }} into main..."
          
          git fetch origin main
          git checkout main
          
          # Use --no-ff to create a merge commit, which allows us to add [skip ci] 
          # to the message to prevent a redundant build on main.
          git merge ${{ needs.find-staging-build.outputs.commit_sha }} --no-ff -m "🚀 promote: sync main with production build #${{ needs.find-staging-build.outputs.run_id }} [skip ci]"
          
          git push origin main

      - name: Notify Discord on Production Deploy
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_PROD }}
        run: |
          # Use the existing script for the standard notification
          ./scripts/discord-deploy.sh "production" "$DISCORD_WEBHOOK_URL" "https://codexcryptica.com/"

          # Construct a simple one-line promotion summary
          RUN_ID="${{ needs.find-staging-build.outputs.run_id }}"
          ACTOR="${{ github.actor }}"
          SUMMARY="🔁 **Promotion Successful**: Staging run #$RUN_ID was promoted to production by $ACTOR."
          
          # Send the summary
          PAYLOAD=$(jq -nc --arg content "$SUMMARY" '{content: $content}')
          curl -s -H "Content-Type: application/json" -X POST --data-binary "$PAYLOAD" "$DISCORD_WEBHOOK_URL"


name: Auto Merge PRs Into Staging

on:
  pull_request_target:
    branches: [staging]
    types: [opened, reopened, ready_for_review, synchronize]

concurrency:
  group: auto-merge-staging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge for staging PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check if the PR is from the same repository
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          BASE_REPO="${{ github.repository }}"
          
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "Skipping PR #$PR_NUMBER because it comes from a fork ($HEAD_REPO)."
            exit 0
          fi

          echo "Enabling auto-merge for PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --auto --squash

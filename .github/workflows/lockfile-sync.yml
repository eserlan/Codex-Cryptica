name: Lockfile Sync

on:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - "**/package.json"

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip if the commit was made by the bot itself to prevent loops
    # Also skip forked PRs, which do not have contents: write or github.head_ref in the base repo
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.5.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update lockfiles without running scripts
        run: |
          bun install --ignore-scripts
          pnpm install --lockfile-only --ignore-scripts

      - name: Commit and push changes
        run: |
          if git diff --quiet bun.lock pnpm-lock.yaml; then
            echo "Lockfiles are already in sync; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock pnpm-lock.yaml
          git commit -m "chore: synchronize lockfiles [skip ci]"
          git push

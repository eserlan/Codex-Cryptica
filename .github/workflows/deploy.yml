name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "**"]
  workflow_run:
    workflows: ["Auto Bump Web Version After Merge"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify_and_build:
    # If triggered by workflow_run, only run if the bump was successful
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint and Test
        run: |
          npm run lint
          npm test

      - name: Build Staging (/staging)
        env:
          BASE_PATH: "/staging"
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          npm run build --workspace=web
          mkdir -p dist/staging
          cp -r apps/web/build/* dist/staging/

      - name: Build Production (/)
        # If we are on a feature branch, we want the production root to be built from the latest stable main
        # This ensures / always points to main, while /staging points to the feature.
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            git checkout main
            npm ci
          fi
          npm run build --workspace=web
          cp -r apps/web/build/* dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist/"

  deploy:
    needs: verify_and_build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Staging
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_STAGING }}
        run: |
          ./scripts/discord-deploy.sh "staging" "$DISCORD_WEBHOOK_URL" "${{ steps.deployment.outputs.page_url }}staging"

      - name: Notify Production
        if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_run')
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_PROD }}
        run: |
          ./scripts/discord-deploy.sh "production" "$DISCORD_WEBHOOK_URL" "${{ steps.deployment.outputs.page_url }}"

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - "apps/web/src/lib/content/blog/**"
      - "scripts/publish-blog-content.mjs"
      - ".github/workflows/deploy-blog-content.yml"
      - "docs/**"
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint and Test
        run: |
          npm run lint
          npm run test:coverage

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: |
            apps/*/coverage/
            packages/*/coverage/
          retention-days: 7

      - name: Build Application
        env:
          VITE_PUBLIC_APP_URL: "https://codexcryptica.com"
          VITE_ROBOTS_DIRECTIVE: "index, follow"
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_BLOG_CONTENT_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/blog-content/blog
        run: npm run build --workspace=web

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: apps/web/build/
          include-hidden-files: true
          retention-days: 1

      - name: Upload staging artifact for promotion
        if: github.ref_name == 'staging'
        uses: actions/upload-artifact@v7
        with:
          name: staging-dist
          path: apps/web/build/
          include-hidden-files: true
          retention-days: 30

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy Production to Cloudflare Pages
        if: github.ref_name == 'main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica

      - name: Deploy Staging to Cloudflare Pages
        if: github.ref_name == 'staging' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica --branch=staging

      - name: Deploy Preview to Cloudflare Pages
        if: github.event_name == 'pull_request'
        id: deploy_preview
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOYMENT_URL: ${{ steps.deploy_preview.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy_preview.outputs.deployment-alias-url }}
        run: |
          COMMENT="🚀 **Preview Deployment Ready!**

          **URL:** $DEPLOYMENT_URL
          **Alias:** $ALIAS_URL

          _Changes will be live shortly._"
          
          # Check if a comment already exists to avoid spamming
          EXISTING_COMMENT_ID=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[] | select(.body | contains("Preview Deployment Ready")) | .id' | head -n 1)
          
          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" -f body="$COMMENT"
          else
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -f body="$COMMENT"
          fi

      - name: Notify Discord on Production Deploy
        if: github.ref_name == 'main' && success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_PROD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/discord-deploy.sh "production" "$DISCORD_WEBHOOK_URL" "https://codexcryptica.com/"

      - name: Notify Discord on Staging Deploy
        if: github.ref_name == 'staging' && success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_STAGING }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/discord-deploy.sh "staging" "$DISCORD_WEBHOOK_URL" "https://staging.codexcryptica.com/"

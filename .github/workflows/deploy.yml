name: Deploy to Cloudflare Pages

on:
  push:
    branches: [staging]
    paths-ignore:
      - "apps/web/src/lib/content/blog/**"
      - "scripts/publish-blog-content.mjs"
      - ".github/workflows/deploy-blog-content.yml"
      - "docs/**"
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:
    inputs:
      full_validation:
        description: Run every workspace check
        type: boolean
        default: true
      base_ref:
        description: Base ref for an affected-only manual run
        type: string
        default: staging

concurrency:
  group: "cloudflare-pages-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  select-validation:
    name: Select Validation Scope
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.select.outputs.affected }}
      lint: ${{ steps.select.outputs.lint }}
      test_coverage: ${{ steps.select.outputs.test_coverage }}
      lint_types: ${{ steps.select.outputs.lint_types }}
      web: ${{ steps.select.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Select affected workspaces
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ inputs.base_ref }}
          FORCE_FULL: ${{ inputs.full_validation }}
        run: |
          if [ "$EVENT_NAME" = "push" ] || [ "$FORCE_FULL" = "true" ]; then
            bun scripts/affected-workspaces.mjs --full | tee selection.txt
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            bun scripts/affected-workspaces.mjs --base "$BASE_SHA" --head HEAD | tee selection.txt
          else
            bun scripts/affected-workspaces.mjs --base "origin/$BASE_REF" --head HEAD | tee selection.txt
          fi
          {
            echo "## Validation scope"
            echo
            echo '```text'
            cat selection.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  type-check:
    name: Type Check
    needs: select-validation
    if: needs.select-validation.outputs.lint_types != ''
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun cache
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Type Check
        env:
          WORKSPACES: ${{ needs.select-validation.outputs.lint_types }}
        run: |
          for workspace in $WORKSPACES; do
            bun run --filter "$workspace" lint:types
          done

  lint-test:
    name: Lint and Test
    needs: select-validation
    if: needs.select-validation.outputs.affected != ''
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun cache
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        env:
          WORKSPACES: ${{ needs.select-validation.outputs.lint }}
        run: |
          for workspace in $WORKSPACES; do
            bun run --filter "$workspace" lint
          done

      - name: Test
        env:
          WORKSPACES: ${{ needs.select-validation.outputs.test_coverage }}
        run: |
          for workspace in $WORKSPACES; do
            bun run --filter "$workspace" test:coverage
          done

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: |
            apps/*/coverage/
            packages/*/coverage/
          retention-days: 7

  build:
    name: Build
    needs: select-validation
    if: needs.select-validation.outputs.web == 'true'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun cache
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Application
        env:
          VITE_PUBLIC_APP_URL: "https://codexcryptica.com"
          VITE_ROBOTS_DIRECTIVE: "index, follow"
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_BLOG_CONTENT_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/blog-content/blog
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_TURNSTILE_SITE_KEY: "0x4AAAAAADpp_w2_FPAdSQzQ"
        run: bun run --filter web build

      - name: Copy bundle report into build output
        run: |
          REPORT=$(find apps/web/.svelte-kit/output -name "bundle-report.html" | head -n 1)
          if [ -z "$REPORT" ]; then
            echo "::error::bundle-report.html not found in Vite build output — visualizer may not have run"
            exit 1
          fi
          mkdir -p apps/web/build
          cp "$REPORT" apps/web/build/bundle-report.html

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: apps/web/build/
          include-hidden-files: true
          retention-days: 1

      - name: Upload staging artifact for promotion
        if: github.ref_name == 'staging'
        uses: actions/upload-artifact@v7
        with:
          name: staging-dist
          path: apps/web/build/
          include-hidden-files: true
          retention-days: 30

      - name: Upload Bundle Report
        uses: actions/upload-artifact@v7
        with:
          name: bundle-report
          path: |
            apps/web/.svelte-kit/output/**/bundle-report.html
            apps/web/.svelte-kit/output/**/bundle-stats.json
          include-hidden-files: true
          retention-days: 30

      - name: Summarize Bundle Size
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Bundle size"
            echo
            echo "| Metric | Size |"
            echo "| --- | ---: |"
            echo "| Build directory | $(du -sh apps/web/build | cut -f1) |"
            echo "| JavaScript assets | $(find apps/web/build -type f -name '*.js' -print0 | du -ch --files0-from=- | tail -n 1 | cut -f1) |"
            echo "| CSS assets | $(find apps/web/build -type f -name '*.css' -print0 | du -ch --files0-from=- | tail -n 1 | cut -f1) |"
          } >> "$GITHUB_STEP_SUMMARY"

  validation-gate:
    name: Validation Gate
    if: always()
    needs: [select-validation, type-check, lint-test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Require successful validation
        env:
          SELECT_VALIDATION_RESULT: ${{ needs.select-validation.result }}
          TYPE_CHECK_RESULT: ${{ needs.type-check.result }}
          LINT_TEST_RESULT: ${{ needs.lint-test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          for result in "$SELECT_VALIDATION_RESULT" "$TYPE_CHECK_RESULT" "$LINT_TEST_RESULT" "$BUILD_RESULT"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::Required validation job finished with: $result"
              exit 1
            fi
          done

  deploy:
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request') &&
      needs.build.result == 'success' &&
      needs.lint-test.result == 'success' &&
      (needs.type-check.result == 'success' || needs.type-check.result == 'skipped')
    needs: [build, lint-test, type-check]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || (github.ref_name == 'staging' && 'staging' || 'preview') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage-download/

      - name: Copy web coverage into preview
        run: |
          if [ -d "coverage-download/apps/web/coverage" ]; then
            cp -r coverage-download/apps/web/coverage dist/coverage
          fi

      - name: Deploy Staging to Cloudflare Pages
        if: github.ref_name == 'staging' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica --branch=staging

      - name: Deploy Preview to Cloudflare Pages
        if: github.event_name == 'pull_request' && env.CLOUDFLARE_API_TOKEN != ''
        id: deploy_preview
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica --branch=${{ github.head_ref }}

      - name: Comment on PR
        if: github.event_name == 'pull_request' && success() && env.CLOUDFLARE_API_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BRANCH="${{ github.head_ref }}"
          CF_BRANCH=$(printf '%s' "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-28 \
            | sed -E 's/-+$//')
          DEPLOYMENT_URL="https://${CF_BRANCH}.codex-cryptica.pages.dev"

          echo "[Bundle report](${DEPLOYMENT_URL}/bundle-report.html)" >> "$GITHUB_STEP_SUMMARY"

          COMMENT="$(printf '🚀 **Preview Deployment Ready!**\n\n**URL:** %s\n**Bundle report:** %s/bundle-report.html\n**Coverage:** %s/coverage/\n**Branch:** `%s`\n\n_Changes will be live shortly._' "$DEPLOYMENT_URL" "$DEPLOYMENT_URL" "$DEPLOYMENT_URL" "$BRANCH")"

          EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[] | select(.body | contains("Preview Deployment Ready!")) | .id' | head -n 1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" -f body="$COMMENT"
          else
            gh api -X POST "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" -f body="$COMMENT"
          fi

      - name: Notify Discord on Staging Deploy
        if: github.ref_name == 'staging' && success() && github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_STAGING }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/discord-deploy.sh "staging" "$DISCORD_WEBHOOK_URL" "https://staging.codexcryptica.com/"

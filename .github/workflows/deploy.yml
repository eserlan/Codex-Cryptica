name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - "apps/web/src/lib/content/blog/**"
      - "scripts/publish-blog-content.mjs"
      - ".github/workflows/deploy-blog-content.yml"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint and Test
        run: |
          npm run lint
          npm run test:coverage

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: |
            apps/*/coverage/
            packages/*/coverage/
          retention-days: 7

      - name: Build Application
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_BLOG_CONTENT_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/blog-content/blog
        run: npm run build --workspace=web

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: apps/web/build/
          include-hidden-files: true
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy Production to Cloudflare Pages
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica

      - name: Deploy Staging to Cloudflare Pages
        if: github.ref_name == 'staging'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica --branch=staging

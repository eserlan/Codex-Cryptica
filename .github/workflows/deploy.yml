name: Deploy to GitHub Pages

on:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [production, staging]
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Production always builds from main; Staging builds from the current ref
          ref: ${{ matrix.environment == 'production' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint and Test
        run: |
          npm run lint
          npm run test:coverage

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.environment }}
          path: |
            apps/*/coverage/
            packages/*/coverage/
          retention-days: 7

      - name: Build Application
        env:
          BASE_PATH: ${{ matrix.environment == 'staging' && '/staging' || '' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          npm run build --workspace=web
          cp apps/web/build/index.html apps/web/build/404.html

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.environment }}
          path: apps/web/build/
          include-hidden-files: true
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Production Build
        uses: actions/download-artifact@v8
        with:
          name: dist-production
          path: dist/

      - name: Download Staging Build
        uses: actions/download-artifact@v8
        with:
          name: dist-staging
          path: dist/staging/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist/"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Staging
        if: success() && github.ref != 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_STAGING }}
        run: |
          ./scripts/discord-deploy.sh "staging" "$DISCORD_WEBHOOK_URL" "${{ steps.deployment.outputs.page_url }}staging"

      - name: Notify Production
        if: success() && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_PROD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/discord-deploy.sh "production" "$DISCORD_WEBHOOK_URL" "${{ steps.deployment.outputs.page_url }}"

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - "apps/web/src/lib/content/blog/**"
      - "scripts/publish-blog-content.mjs"
      - ".github/workflows/deploy-blog-content.yml"
      - "docs/**"
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  type-check:
    name: Deploy Type Check
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Type Check
        continue-on-error: true
        run: bun run lint:types

  lint-test:
    name: Deploy Lint and Test
    needs: type-check
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test:coverage

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: deploy-coverage
          path: |
            apps/*/coverage/
            packages/*/coverage/
          retention-days: 7

  build:
    needs: lint-test
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Application
        env:
          VITE_PUBLIC_APP_URL: "https://codexcryptica.com"
          VITE_ROBOTS_DIRECTIVE: "index, follow"
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_BLOG_CONTENT_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/blog-content/blog
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: bun run build

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: apps/web/build/
          include-hidden-files: true
          retention-days: 1

      - name: Upload staging artifact for promotion
        if: github.ref_name == 'staging'
        uses: actions/upload-artifact@v7
        with:
          name: staging-dist
          path: apps/web/build/
          include-hidden-files: true
          retention-days: 30

      - name: Upload Bundle Report
        uses: actions/upload-artifact@v7
        with:
          name: bundle-report
          path: |
            apps/web/.svelte-kit/output/**/bundle-report.html
            apps/web/.svelte-kit/output/**/bundle-stats.json
          include-hidden-files: true
          retention-days: 30

      - name: Summarize Bundle Size
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Bundle size"
            echo
            echo "| Metric | Size |"
            echo "| --- | ---: |"
            echo "| Build directory | $(du -sh apps/web/build | cut -f1) |"
            echo "| JavaScript assets | $(find apps/web/build -type f -name '*.js' -print0 | du -ch --files0-from=- | tail -n 1 | cut -f1) |"
            echo "| CSS assets | $(find apps/web/build -type f -name '*.css' -print0 | du -ch --files0-from=- | tail -n 1 | cut -f1) |"
            echo
            echo "Bundle treemap and stats are available in the \`bundle-report\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || (github.ref_name == 'staging' && 'staging' || 'preview') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy Production to Cloudflare Pages
        if: github.ref_name == 'main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica

      - name: Deploy Staging to Cloudflare Pages
        if: github.ref_name == 'staging' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica --branch=staging

      - name: Deploy Preview to Cloudflare Pages
        if: github.event_name == 'pull_request' && env.CLOUDFLARE_API_TOKEN != ''
        id: deploy_preview
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codex-cryptica --branch=${{ github.head_ref }}

      - name: Comment on PR
        if: github.event_name == 'pull_request' && success() && env.CLOUDFLARE_API_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Construct the preview URL using Cloudflare Pages branch slugging rules:
          # lowercase, replace non [a-z0-9-] with "-", trim edge "-", then truncate.
          BRANCH="${{ github.head_ref }}"
          CF_BRANCH=$(printf '%s' "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-28 \
            | sed -E 's/-+$//')
          DEPLOYMENT_URL="https://${CF_BRANCH}.codex-cryptica.pages.dev"

          COMMENT="🚀 **Preview Deployment Ready!**

          **URL:** ${DEPLOYMENT_URL}
          **Branch:** \`${BRANCH}\`

          _Changes will be live shortly._"

          # Check if a comment already exists to avoid spamming
          EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[] | select(.body | contains("Preview Deployment Ready!")) | .id' | head -n 1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" -f body="$COMMENT"
          else
            gh api -X POST "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" -f body="$COMMENT"
          fi

      - name: Notify Discord on Production Deploy
        if: github.ref_name == 'main' && success() && github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_PROD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/discord-deploy.sh "production" "$DISCORD_WEBHOOK_URL" "https://codexcryptica.com/"

      - name: Notify Discord on Staging Deploy
        if: github.ref_name == 'staging' && success() && github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_STAGING }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/discord-deploy.sh "staging" "$DISCORD_WEBHOOK_URL" "https://staging.codexcryptica.com/"

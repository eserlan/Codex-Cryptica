name: Deploy to GitHub Pages

on:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # On main branch, build production only. On feature branches, build staging only.
        environment: >-
          ${{ fromJSON(github.ref == 'refs/heads/main' && '["production"]' || '["staging"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Production always builds from main; Staging builds from the current ref
          ref: ${{ matrix.environment == 'production' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint and Test
        run: |
          npm run lint
          npm test

      - name: Build Application
        env:
          BASE_PATH: ${{ matrix.environment == 'staging' && '/staging' || '' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm run build --workspace=web

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.environment }}
          path: apps/web/build/
          include-hidden-files: true
          retention-days: ${{ matrix.environment == 'production' && 90 || 1 }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Latest Production Build
        if: github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          # Download dist-production from the most recent successful run on main
          RUN_ID=$(gh run list --branch main --status success --workflow "Deploy to GitHub Pages" --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name dist-production --dir dist
          else
            echo "No production artifact found on main"
          fi

      - name: Download Production Build (Current Run)
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v4
        with:
          name: dist-production
          path: dist/

      - name: Download Staging Build (Current Run)
        if: github.ref != 'refs/heads/main'
        uses: actions/download-artifact@v4
        with:
          name: dist-staging
          path: dist/staging/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist/"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Staging
        if: success() && github.ref != 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_STAGING }}
        run: |
          ./scripts/discord-deploy.sh "staging" "$DISCORD_WEBHOOK_URL" "${{ steps.deployment.outputs.page_url }}staging"

      - name: Notify Production
        if: success() && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_PROD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/discord-deploy.sh "production" "$DISCORD_WEBHOOK_URL" "${{ steps.deployment.outputs.page_url }}"

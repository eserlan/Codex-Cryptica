name: Merge Staging to Main After Promotion

on:
  workflow_run:
    workflows: ["Promote Staging to Production"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  merge-to-main:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge Staging to Main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin staging
          git merge origin/staging --no-ff -m "🚀 promote: merge staging to main after production deployment"
          git push origin main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Find latest merged PR to staging for bump label
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recently merged PR targeting staging
          PR_NUMBER=$(gh pr list \
            --base staging \
            --state merged \
            --limit 1000 \
            --json number,mergedAt \
            --jq 'sort_by(.mergedAt) | if length == 0 then empty else last.number end')
          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PRs found targeting staging" >&2
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Found latest merged staging PR: #$PR_NUMBER"

      - name: Bump web version and service worker cache
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/bump-web-version.mjs

      - name: Commit and push version bump
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add apps/web/package.json apps/web/src/lib/config/index.ts apps/web/src/service-worker.ts
          git commit -m "chore(web): auto-bump version after staging promotion"
          git push origin main

      - name: Back-merge main into staging (keep branches in sync)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The promotion merge commit and the auto version-bump land on main
          # only. Back-merge them into staging every promotion so the branches
          # never drift (which is what makes the next promotion re-conflict).
          git fetch origin main staging
          # The runner checked out `main`, so there's no local `staging` branch;
          # (re)create it from the remote before merging.
          git switch -C staging origin/staging
          if git merge origin/main --no-ff \
              -m "⏪ sync: back-merge main into staging after promotion"; then
            git push origin staging
            echo "Back-merged main into staging."
          else
            # Rare: staging advanced concurrently and conflicts. Don't fail the
            # promotion — open a PR for manual resolution instead.
            git merge --abort
            BR="auto/back-merge-main-$(date +%Y%m%d-%H%M%S)"
            git switch -c "$BR" origin/main
            git push origin "$BR"
            if gh pr create --base staging --head "$BR" \
              --title "⏪ Back-merge main into staging (post-promotion sync)" \
              --body $'Automated back-merge to keep `staging` in sync with `main` after promotion.\n\n**Merge this with a MERGE COMMIT, not squash** — a squash would flatten the merge and reintroduce branch drift.'; then
              echo "::warning::main->staging back-merge conflicted; opened sync PR from ${BR} for manual resolution."
            else
              echo "::error::main->staging back-merge conflicted AND opening a sync PR failed; branch ${BR} was pushed — resolve manually."
            fi
          fi

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering release workflow on main..."
          gh workflow run release.yml --ref main

      - name: Notify Discord on Main Merge
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_PROD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY="✅ **Staging merged to main**: Production changes are now in the main branch."
          PAYLOAD=$(jq -nc --arg content "$SUMMARY" '{content: $content}')
          curl -s -H "Content-Type: application/json" -X POST --data-binary "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

name: Copilot Review Notification

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: |
      github.event.review.user.login == 'Copilot' ||
      github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' ||
      contains(toLower(github.event.review.user.login), 'copilot')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.VITE_DISCORD_WEBHOOK_URL_STAGING }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEWER: ${{ github.event.review.user.login }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          chmod +x ./scripts/discord-review-notify.sh
          ./scripts/discord-review-notify.sh

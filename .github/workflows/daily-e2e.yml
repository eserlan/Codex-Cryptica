name: Daily E2E Tests

on:
  schedule:
    # Run at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: "e2e-tests"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npm exec --workspace=web -- playwright install --with-deps chromium

      - name: Run E2E Tests
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npx playwright test --config apps/web/playwright.config.ts --reporter=list,html --workers=2

      - name: Prepare Report for Deployment
        if: always()
        run: |
          mkdir -p public-report
          cp -r apps/web/playwright-report/* public-report/

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-report/

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Note: This will overwrite the current GH Pages site with the report
          # If you want to keep the app AND reports, we should merge them.
          # For now, this is a dedicated "Report Site" approach or a starting point.
          preview: true 

      - name: Upload Artifact (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

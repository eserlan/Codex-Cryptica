name: Daily E2E Tests

on:
  schedule:
    # Run at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: "e2e-tests"
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  test-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npm exec --workspace=web -- playwright install --with-deps chromium

      - name: Run E2E Tests
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SHARED_GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        # We run from the apps/web directory to ensure paths are correct
        # We override workers to 2 (standard GHA) to speed up from 41 mins
        # We use 'github' reporter for annotations and 'html' for the artifact
        working-directory: apps/web
        run: npx playwright test --reporter=list,html,github --workers=2

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Post Summary
        if: always()
        run: |
          echo "### E2E Test Run Complete 🎭" >> $GITHUB_STEP_SUMMARY
          echo "The full interactive HTML report has been uploaded as an **artifact**." >> $GITHUB_STEP_SUMMARY
          echo "You can find it at the bottom of this page under 'Artifacts'. Download and open 'index.html' to see screenshots and traces." >> $GITHUB_STEP_SUMMARY
